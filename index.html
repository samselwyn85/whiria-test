<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whiria Ngā Ara — theory of change builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAFAF6; --paper-2:#F2F1EA; --surface:#FFFFFF; --surface-2:#F4F3EE;
  --primary:#1C5A4A; --primary-deep:#143F34; --primary-soft:#E5EFE9; --primary-line:#BCD6CB;
  --accent:#B66A38; --accent-soft:#F3E7DC; --accent-line:#E6C9AE;
  --ink:#23211E; --ink-2:#5F5B53; --ink-3:#928D83;
  --line:rgba(35,33,30,.12); --line-2:rgba(35,33,30,.22);
  --kawa:#C77F1B; --systemic:#2E7CC4; --material:#1F9E78; --behaviour:#D8553A; --symptomatic:#7A72C9;
  --r-s:9px; --r-m:13px; --r-l:18px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
#root{min-height:100%}
button{font-family:inherit}
.disp{font-family:'Inter',system-ui,sans-serif}

/* buttons / inputs */
.btn{font-size:14px;font-weight:500;border:.5px solid var(--line-2);background:var(--surface);color:var(--ink);border-radius:var(--r-s);padding:9px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .15s,border-color .15s,transform .1s}
.btn:hover{background:var(--surface-2)}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--primary-soft);border-color:var(--primary)}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-deep)}
.btn-ghost{border-color:transparent;background:transparent;color:var(--ink-2)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-block{width:100%;justify-content:center}
.btn:disabled{opacity:.45;cursor:default}
.icon{width:1em;height:1em;display:inline-block;vertical-align:-2px}
input[type=text],input[type=email],textarea,select{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface);border:.5px solid var(--line-2);border-radius:var(--r-s);padding:10px 12px}
textarea{resize:vertical;line-height:1.5}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
::placeholder{color:var(--ink-3)}

/* helper tip */
.tip{display:flex;align-items:flex-start;gap:10px;background:var(--surface-2);border:.5px solid var(--line);border-radius:var(--r-m);padding:11px 13px;margin:0 0 18px;font-size:13.5px;color:var(--ink-2);line-height:1.45;max-width:680px}
.tip-ic{flex:none;margin-top:1px;color:var(--accent)}
.tip-tx{flex:1}
.tip-x{flex:none;border:0;background:transparent;color:var(--ink-3);cursor:pointer;padding:3px;border-radius:6px;line-height:0}
.tip-x:hover{background:rgba(35,33,30,.07);color:var(--ink)}
.tip-x:focus-visible{outline:none;box-shadow:0 0 0 3px var(--primary-soft)}

/* logo */
.lockup{display:flex;align-items:center;gap:11px}
.tile{width:38px;height:38px;border-radius:11px;background:var(--primary);display:flex;align-items:center;justify-content:center;flex:none}
.wordmark{font-weight:600;font-size:18px;letter-spacing:-.01em;color:var(--ink)}
.wordmark small{display:block;font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-top:1px}

/* ============ LANDING ============ */
.hero{display:grid;grid-template-columns:1fr 1.08fr;min-height:100vh}
.hero-left{display:flex;flex-direction:column;justify-content:center;padding:54px 6vw;max-width:620px;margin-left:auto;width:100%}
.hero-right{position:relative;background:linear-gradient(160deg,#F4F3EC 0%,#EBEFE9 60%,#E4ECE6 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;border-left:.5px solid var(--line)}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--primary);margin:26px 0 14px}
.hero h1{font-weight:600;font-size:clamp(32px,3.8vw,44px);line-height:1.12;letter-spacing:-.022em;margin:0 0 16px;color:var(--ink)}
.hero h1 em{font-style:normal;color:var(--primary)}
.hero .sub{font-size:16px;color:var(--ink-2);margin:0 0 30px;max-width:46ch;line-height:1.5}
.signin{max-width:380px}
.signin .lbl{display:block;font-size:13px;font-weight:500;margin:0 0 6px}
.users{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.user{display:flex;align-items:center;justify-content:space-between;gap:10px;border:.5px solid var(--line);background:var(--surface);border-radius:var(--r-m);padding:10px 13px;cursor:pointer;text-align:left;transition:border-color .15s,background .15s}
.user:hover{border-color:var(--primary-line);background:var(--primary-soft)}
.user:focus-visible{outline:none;box-shadow:0 0 0 3px var(--primary-soft);border-color:var(--primary)}
.user .nm{font-size:14px;font-weight:500;margin:0}
.user .em{font-size:12px;color:var(--ink-2);margin:0}
.badge{font-size:11px;font-weight:600;letter-spacing:.02em;padding:3px 9px;border-radius:999px;flex:none}
.badge.ok{background:var(--primary-soft);color:var(--primary-deep)}
.badge.wait{background:var(--accent-soft);color:var(--accent)}
.note{font-size:12px;color:var(--ink-3);margin:16px 0 0;line-height:1.45}
.ring-cap{position:absolute;top:34px;left:0;right:0;text-align:center;z-index:3}
.ring-cap .k{font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--primary)}
.ring-cap .pills{display:flex;gap:7px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:500;color:var(--ink-2);background:rgba(255,255,255,.7);border:.5px solid var(--line);border-radius:999px;padding:4px 11px}
.ring-stage{position:relative;width:480px;height:480px;flex:none}
.ring-glow{position:absolute;inset:-12%;background:radial-gradient(circle at center,rgba(28,90,74,.13),rgba(28,90,74,0) 62%);pointer-events:none}
.ring-guide{position:absolute;inset:7%;border:1.6px dashed rgba(20,63,52,.42);border-radius:50%}
.ring-guide.two{inset:20%;border-color:rgba(20,63,52,.3)}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:230px;z-index:2}
.ring-center .ttl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);text-align:center;margin-bottom:8px}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cbox{background:var(--surface);border:.5px solid var(--primary-line);border-radius:8px;padding:7px 8px;font-size:11px;line-height:1.2;color:var(--primary-deep);text-align:center;box-shadow:0 1px 2px rgba(20,63,52,.05)}
.rotor{position:absolute;inset:0;animation:spin 70s linear infinite;transform-origin:center;z-index:1}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinrev{to{transform:rotate(-360deg)}}
.slot{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
.counter{animation:spinrev 70s linear infinite;transform-origin:center}
.ocard{width:108px;background:var(--surface);border-radius:9px;border:.5px solid var(--line);border-left:3px solid var(--ink-3);padding:8px 10px;font-size:11.5px;font-weight:500;line-height:1.18;color:var(--ink);box-shadow:0 2px 8px rgba(35,33,30,.07);text-align:left}
.ocard .dom{display:block;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-top:3px}
.how{background:var(--paper);border-top:.5px solid var(--line);padding:64px 6vw}
.how-in{max-width:1000px;margin:0 auto}
.how h2{font-weight:600;font-size:clamp(24px,2.6vw,30px);letter-spacing:-.02em;margin:8px 0 6px;color:var(--ink)}
.how .lede{color:var(--ink-2);margin:0 0 36px;max-width:54ch}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.step{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r-l);padding:24px}
.step .n{width:30px;height:30px;border-radius:50%;background:var(--primary-soft);color:var(--primary-deep);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.step h3{font-size:16px;font-weight:600;margin:0 0 6px}
.step p{font-size:14px;color:var(--ink-2);margin:0;line-height:1.5}
.land-foot{text-align:center;color:var(--ink-3);font-size:12px;padding:26px}

/* ============ APP SHELL ============ */
.shell{min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px clamp(16px,4vw,40px);border-bottom:.5px solid var(--line);background:var(--surface);flex-wrap:wrap}
.brandbtn{display:flex;align-items:center;gap:10px;background:none;border:0;cursor:pointer;padding:0}
.brandbtn .tile{width:32px;height:32px;border-radius:9px}
.brandbtn .wm{font-weight:600;font-size:16px;letter-spacing:-.01em;color:var(--ink)}
.stepper{display:flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line-2)}
.dot.on{background:var(--primary)}
.dot.done{background:var(--primary-line)}
.stepname{font-size:12px;color:var(--ink-2);margin-left:5px}
.bar-right{display:flex;align-items:center;gap:14px}
.saved{font-size:12px;color:var(--ink-3);display:inline-flex;align-items:center;gap:4px;min-width:46px}
.lang{display:inline-flex;border:.5px solid var(--line);border-radius:var(--r-s);overflow:hidden;font-size:12px}
.lang button{border:0;background:transparent;color:var(--ink-2);padding:5px 11px;cursor:pointer}
.lang button.on{background:var(--surface-2);color:var(--ink)}
.helpbtn{display:inline-flex;align-items:center;gap:5px;border:.5px solid var(--line);background:var(--surface);color:var(--ink-2);border-radius:var(--r-s);padding:5px 10px;font-size:12.5px;font-weight:500;cursor:pointer}
.helpbtn:hover{background:var(--surface-2);color:var(--ink)}
.helpbtn .icon{width:15px;height:15px}
.why{display:flex;gap:11px;align-items:flex-start;background:var(--primary-soft);border:.5px solid var(--primary-line);border-radius:var(--r-m);padding:11px 13px;margin:0 0 16px;max-width:780px}
.why-ic{flex:none;color:var(--primary);margin-top:1px}
.why-ic .icon{width:17px;height:17px}
.why-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.why-line{font-size:12.7px;line-height:1.46;color:var(--ink-2)}
.why-k{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--primary-deep);margin-right:7px}
.why-act{flex:none;display:flex;align-items:center;gap:2px}
.why-link{display:inline-flex;align-items:center;gap:3px;border:0;background:transparent;color:var(--primary);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;padding:3px 5px;border-radius:6px}
.why-link:hover{background:rgba(28,90,74,.09)}
.why-link .icon{width:13px;height:13px}
.why-x{flex:none;border:0;background:transparent;color:var(--ink-3);cursor:pointer;padding:3px;border-radius:6px;line-height:0}
.why-x:hover{background:rgba(0,0,0,.05);color:var(--ink)}
.why-x .icon{width:15px;height:15px}
@media(max-width:620px){.why{flex-wrap:wrap}.why-act{margin-left:auto}}
.help-wrap{max-width:880px}
.help-list{display:flex;flex-direction:column;gap:12px;margin-top:6px}
.help-card{border:.5px solid var(--line);border-radius:var(--r-l);background:var(--surface);padding:15px 18px;transition:box-shadow .2s,border-color .2s}
.help-card.focus{border-color:var(--primary-line);box-shadow:0 0 0 3px var(--primary-soft)}
.help-h{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.help-num{flex:none;width:24px;height:24px;border-radius:50%;background:var(--primary-soft);color:var(--primary-deep);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.help-h h2{margin:0;font-size:16px;color:var(--ink)}
.help-go{margin-left:auto;padding:5px 11px;font-size:12.5px}
.help-p{margin:0 0 6px;font-size:13.1px;line-height:1.5;color:var(--ink-2)}
.help-p strong{color:var(--ink)}
.help-how{margin-top:9px;background:var(--paper);border-radius:var(--r-m);padding:9px 13px}
.help-how-l{display:block;font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
.help-how ol{margin:0;padding-left:18px}
.help-how li{font-size:12.6px;line-height:1.55;color:var(--ink-2);margin:1px 0}
.ind-prev{font-size:11.5px;line-height:1.36;color:var(--ink-3);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ring-amb{position:absolute;inset:9%;border-radius:50%;background:radial-gradient(circle at 50% 46%,rgba(28,90,74,.11),rgba(28,90,74,0) 62%);pointer-events:none;z-index:0;animation:breathe 7s ease-in-out infinite}
.ring-orbit-guide{position:absolute;left:50%;top:50%;width:80%;height:86%;transform:translate(-50%,-50%);border:1.3px dashed rgba(20,63,52,.15);border-radius:50%;pointer-events:none;z-index:0;animation:spin 95s linear infinite}
.ring-canvas .ring-svg{z-index:1}
.ring-canvas .ring-act,.ring-canvas .ring-card,.ring-canvas .ring-empty{z-index:2}
.ring-ellipse{animation:march 2.6s linear infinite}
@keyframes breathe{0%,100%{opacity:.5;transform:scale(.985)}50%{opacity:1;transform:scale(1.012)}}
@keyframes march{to{stroke-dashoffset:-22}}
@media(prefers-reduced-motion:reduce){.ring-amb,.ring-orbit-guide,.ring-ellipse{animation:none!important}}
.userchip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2)}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--primary-soft);color:var(--primary-deep);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}
.main{flex:1;background:var(--paper)}
.container{max-width:1040px;margin:0 auto;padding:30px clamp(16px,4vw,40px)}
.footer{display:flex;align-items:center;justify-content:space-between;padding:14px clamp(16px,4vw,40px);border-top:.5px solid var(--line);background:var(--surface)}

h1.title{font-weight:600;font-size:27px;line-height:1.18;letter-spacing:-.02em;margin:0 0 7px;color:var(--ink)}
.lede{color:var(--ink-2);font-size:14.5px;margin:0 0 18px;max-width:62ch}
.eyebrow2{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);margin:0 0 12px}
.label{display:block;font-size:13px;color:var(--ink);margin:0 0 6px}
.hint{font-size:12px;color:var(--ink-3)}
.field{margin-bottom:17px;max-width:580px}

/* dashboard */
.dash-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.section-h{margin:4px 0 3px}
.section-h h2{font-size:14px;font-weight:600;letter-spacing:.01em;margin:0;color:var(--ink)}
.sub-muted{font-size:13px;color:var(--ink-2);margin:0 0 14px}
.ex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:11px;margin-bottom:32px}
.ex-card{text-align:left;border:.5px solid var(--line);background:var(--surface);border-radius:var(--r-m);padding:15px;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;display:flex;flex-direction:column;gap:5px}
.ex-card:hover{border-color:var(--primary-line);background:var(--primary-soft)}
.ex-card:active{transform:translateY(1px)}
.ex-card:focus-visible{outline:none;box-shadow:0 0 0 3px var(--primary-soft);border-color:var(--primary)}
.exn{font-size:14.5px;font-weight:600;color:var(--ink)}
.exb{font-size:12.5px;color:var(--ink-2);line-height:1.35}
.exs{font-size:12px;font-weight:600;color:var(--primary);margin-top:3px;display:inline-flex;align-items:center;gap:4px}
.toc-card{display:flex;align-items:center;justify-content:space-between;gap:12px;border:.5px solid var(--line);border-radius:var(--r-m);padding:14px 16px;margin-bottom:10px;background:var(--surface)}
.toc-card:hover{border-color:var(--line-2)}
.toc-name{font-size:15px;font-weight:600;margin:0 0 2px;cursor:pointer}
.toc-meta{font-size:12px;color:var(--ink-2);margin:0}
.toc-actions{display:flex;gap:4px;flex:none}
.iconbtn{border:0;background:transparent;color:var(--ink-3);cursor:pointer;padding:7px;border-radius:7px;line-height:0}
.iconbtn:hover{background:var(--surface-2);color:var(--ink)}
.iconbtn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--primary-soft);color:var(--ink)}
.iconbtn:disabled{opacity:.3;cursor:default}

/* pathway — vertical list */
.split{display:flex;gap:0;min-height:calc(100vh - 126px)}
.side{width:230px;flex:none;border-right:.5px solid var(--line);padding:22px;background:var(--surface)}
.colmain{flex:1;padding:26px;min-width:0}
.tpl{display:block;width:100%;text-align:left;font-size:13px;border:.5px solid var(--line);background:var(--surface);border-radius:var(--r-s);padding:10px 12px;margin-bottom:7px;cursor:pointer;color:var(--ink)}
.tpl:hover{border-color:var(--primary-line);background:var(--primary-soft)}
.tpl:focus-visible{outline:none;box-shadow:0 0 0 3px var(--primary-soft);border-color:var(--primary)}
.or{display:flex;align-items:center;gap:8px;margin:16px 0}
.or span{font-size:12px;color:var(--ink-3)}
.or i{flex:1;height:.5px;background:var(--line)}
.pathlist{max-width:600px;margin-top:2px}
.act{display:flex;align-items:center;gap:11px;border:.5px solid var(--line-2);border-radius:var(--r-m);padding:11px 13px;background:var(--surface)}
.act:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.act .num{flex:none;width:24px;height:24px;border-radius:50%;background:var(--primary-soft);color:var(--primary-deep);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center}
.act input{flex:1;min-width:0;border:0;padding:5px 2px;background:transparent;font-size:14.5px;box-shadow:none}
.act input:focus{outline:none;box-shadow:none}
.act .tools{display:flex;gap:1px;flex:none}
.conn{display:flex;justify-content:center;padding:3px 0;color:var(--ink-3)}
.conn .icon{width:18px;height:18px}
.addstep{display:flex;align-items:center;justify-content:center;gap:7px;border:1px dashed var(--line-2);border-radius:var(--r-m);padding:11px 14px;color:var(--ink-2);background:transparent;cursor:pointer;font-size:14px;width:100%;margin-top:8px}
.addstep:hover{border-color:var(--primary-line);color:var(--primary);background:var(--primary-soft)}
.addstep:focus-visible{outline:none;box-shadow:0 0 0 3px var(--primary-soft);border-color:var(--primary)}

/* ============ CAUSAL RING BUILDER ============ */
.dom-group{margin-bottom:14px}
.dom-h{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px}
.dom-dot{width:9px;height:9px;border-radius:50%;flex:none}
.palette-step{display:block;width:100%;text-align:left;border:.5px solid var(--line);border-left:3px solid var(--ink-3);background:var(--surface);border-radius:8px;padding:8px 10px;margin-bottom:6px;cursor:pointer}
.palette-step:hover{background:var(--surface-2)}
.palette-step:focus-visible{outline:none;box-shadow:0 0 0 3px var(--primary-soft)}
.palette-step.added{opacity:.55;cursor:default;background:var(--surface-2)}
.ps-name{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--ink)}
.ps-name .icon{color:var(--primary);width:13px;height:13px}
.ps-desc{display:block;font-size:11.5px;color:var(--ink-2);line-height:1.3;margin-top:2px}
.ring-instruct{font-size:13px;color:var(--ink-2);background:var(--surface-2);border:.5px solid var(--line);border-radius:8px;padding:9px 12px;margin:0 0 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ring-instruct strong{color:var(--ink)}
.linkclear{border:.5px solid var(--line-2);background:var(--surface);border-radius:6px;font-size:12px;font-weight:500;padding:3px 11px;cursor:pointer;color:var(--ink)}
.linkclear:hover{background:var(--surface-2)}
.ring-canvas-wrap{overflow:auto;padding:4px 0 6px}
.ring-canvas{position:relative;flex:none;margin:0 auto}
.ring-svg{position:absolute;left:0;top:0;pointer-events:none}
.ring-act{position:absolute;transform:translate(-50%,-50%);display:flex;align-items:center;gap:7px;width:174px;background:var(--surface);border:1px solid var(--primary-line);border-radius:9px;padding:7px 9px;box-shadow:0 1px 3px rgba(20,63,52,.06)}

.lev-card{border:.5px solid var(--line);border-radius:var(--r-m);background:var(--surface);padding:15px 17px;margin-bottom:13px;max-width:720px}

.lev-q{margin:4px 0 8px 24px}

/* indicators */
.ind-count{font-size:13px;color:var(--ink-2);background:var(--surface-2);border:.5px solid var(--line);border-radius:var(--r-s);padding:8px 12px;margin:0 0 14px;display:inline-block}

.ind-lab{display:block;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin-bottom:2px}

.narr-tools{display:flex;gap:9px;margin:0 0 12px;flex-wrap:wrap}

.coh-h{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:5px}

.meas-list{margin-top:4px}

.mb-f{min-width:0}
.mb-wide{grid-column:1 / -1}
.mb-lab{display:block;font-size:9.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-bottom:1px}
.mb-f p{margin:0;font-size:12px;color:var(--ink);line-height:1.38}
.static-ring{position:relative;margin:0 auto 8px}

.sr-act{position:absolute;transform:translate(-50%,-50%);display:flex;align-items:center;gap:6px;width:152px;background:var(--surface);border:1px solid var(--primary-line);border-radius:8px;padding:5px 8px}
.sr-act .n{flex:none;width:17px;height:17px;border-radius:50%;background:var(--primary-soft);color:var(--primary-deep);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center}
.sr-act .l{font-size:10.5px;color:var(--ink);line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-card{position:absolute;transform:translate(-50%,-50%);max-width:120px;background:var(--surface);border:.5px solid var(--line);border-left:3px solid var(--ink-3);border-radius:7px;padding:5px 8px;font-size:10.5px;font-weight:600;color:var(--ink);line-height:1.15;box-shadow:0 1px 4px rgba(35,33,30,.08)}

.title{font-size:24px;margin-bottom:5px}
.lede{margin-bottom:12px;font-size:14px}
.tip{padding:9px 12px;margin-bottom:14px}

.ind-tim{font-size:11px;color:var(--ink-3)}
.ind-count{margin-bottom:12px}

.modal-overlay{position:fixed;inset:0;background:rgba(20,30,26,.42);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}

@media (max-width:680px){

  .lev-grid,.ind-grid{grid-template-columns:1fr}
}

@media print{
  .topbar,.footer,.no-print,.export-toolbar,.tip{display:none!important}
  body,.main,.shell,.container{background:#fff!important}
  .container{max-width:none;padding:0}
  .export-page{border:0;box-shadow:none;border-radius:0;margin:0;padding:0;max-width:none;page-break-after:always}
  .export-page:last-child{page-break-after:auto}
  .static-ring{page-break-inside:avoid}
}

  .steps{grid-template-columns:1fr}
}
@media (max-width:680px){

  .stepname{display:none}
  .ring-stage{transform:scale(.62)}
}
@media (prefers-reduced-motion:reduce){
  .rotor,.counter{animation:none!important}
  *{transition:none!important}
}

/* ---------- narrative + coherence helpers ---------- */
const byOrder=(a,b)=>((STEP_BY_ID[a.stepId]||{}).order||0)-((STEP_BY_ID[b.stepId]||{}).order||0);
const cap=(s)=>s?s.charAt(0).toUpperCase()+s.slice(1):s;
const lc=(s)=>{s=(s||'').trim();return s?s.charAt(0).toLowerCase()+s.slice(1):s;};
const strip=(s)=>(s||'').trim().replace(/[.\s]+$/,'');
function prose(arr){arr=arr.filter(Boolean);if(!arr.length)return'';if(arr.length===1)return arr[0];if(arr.length===2)return arr[0]+' and '+arr[1];return arr.slice(0,-1).join(', ')+', and '+arr[arr.length-1];}
function placedSorted(p){return [...((p.ring&&p.ring.placed)||[])].sort(byOrder);}
function selectedLevers(p){const out=[];placedSorted(p).forEach(pl=>{const sel=(p.levers||{})[pl.stepId]||{};Object.keys(sel).forEach(lid=>{if(LEVER_BY_ID[lid]&&out.indexOf(lid)===-1)out.push(lid);});});return out;}
function buildNarrative(p){
  const s=p.setup||{};const acts=(p.activities||[]).filter(a=>(a.label||'').trim());const placed=placedSorted(p);const paras=[];
  let p1=(s.name||'This programme');
  if(s.population)p1+=' works alongside '+strip(s.population);
  p1+='.';
  if(s.need)p1+=' It responds to '+lc(strip(s.need))+'.';
  if(s.mainChange)p1+=' Its purpose is to support '+lc(strip(s.mainChange))+'.';
  paras.push(p1);
  if(acts.length)paras.push('In practice, the programme works through '+prose(acts.map(a=>lc(strip(a.label))))+'.');
  if(placed.length){
    const names=placed.map(pl=>lc((STEP_BY_ID[pl.stepId]||{}).name));
    paras.push('These activities are designed to activate a connected sequence of change — '+prose(names)+'. Together, these steps describe how the programme helps whānau move from first contact toward lasting change.');
    const levNames=selectedLevers(p).map(lid=>lc(LEVER_BY_ID[lid].name));
    if(levNames.length)paras.push('It activates these steps through mechanisms such as '+prose(levNames)+'.');
  }
  return paras.join('\n\n');
}
function summarizeSelections(p){
  const s=p.setup||{};const acts=(p.activities||[]).filter(a=>(a.label||'').trim());const placed=placedSorted(p);
  let out='Programme name: '+(s.name||'(none)')+'\n';
  out+='Works with: '+(s.population||'(none)')+'\n';
  out+='Need it responds to: '+(s.need||'(none)')+'\n';
  out+='Main change sought: '+(s.mainChange||'(none)')+'\n';
  out+='Activities in order: '+(acts.map((a,i)=>(i+1)+'. '+a.label).join('; ')||'(none)')+'\n';
  out+='Causal steps: '+(placed.map(pl=>(STEP_BY_ID[pl.stepId]||{}).name).join('; ')||'(none)')+'\n';
  const mechs=[];placed.forEach(pl=>{const sel=(p.levers||{})[pl.stepId]||{};Object.keys(sel).forEach(lid=>{const L=LEVER_BY_ID[lid];if(L)mechs.push(L.name+(sel[lid]?(' — '+sel[lid]):''));});});
  out+='Mechanisms / levers: '+(mechs.join('; ')||'(none)')+'\n';
  return out;
}
async function aiImprove(p){
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:'You are helping a community organisation in Aotearoa New Zealand write the narrative for their theory of change. Using ONLY the structured selections below, write two or three short, warm, plain-language paragraphs in New Zealand English. Do not invent causal claims, indicators, levers or facts that are not in the selections. Do not use bullet points or headings.\n\n'+summarizeSelections(p)}]})});
  const data=await res.json();
  return (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n').trim();
}
function checkCoherence(p){
  const placed=placedSorted(p);const ids=placed.map(x=>x.stepId);const has=(id)=>ids.indexOf(id)!==-1;
  const levs=selectedLevers(p);const indCount=placed.filter(pl=>((p.indicators||{})[pl.stepId]!==false)).length;const out=[];
  if(placed.length>7)out.push({title:'A lot of causal steps',msg:'You have '+placed.length+' causal steps. A theory of change usually reads most clearly when it leans on a few primary steps.',fix:'Keep the steps the programme is deliberately designed to activate, and trim or set the rest aside.',step:2});
  if(has('RIT-03')&&!(has('RIT-02')||levs.indexOf('LEV-RIT-02')!==-1||levs.indexOf('LEV-RIT-03')!==-1))out.push({title:'Habit without a decision or routine',msg:'You have included Habit, but a new habit usually needs a decision point and a practice or routine to form.',fix:'Add the Decision step, or tick a capability-building or practice-and-routine lever.',step:2});
  if(has('MAT-03')&&!(has('MAT-01')||has('MAT-02')))out.push({title:'Agency growth without a material bridge',msg:'Agency growth from material stability usually needs a material change or resilience step underneath it.',fix:'Add Material change or Resilience growth, or note the enabling condition.',step:2});
  if(has('KAW-05')&&!(has('KAW-03')||has('KAW-04')))out.push({title:'Snowball without an earlier gain',msg:'Snowball describes gains spreading. It usually needs an earlier shift that can compound.',fix:'Add an intermediate Kawa step such as Trajectory shift or Scaffolds.',step:2});
  if(placed.length>0&&levs.length===0)out.push({title:'No mechanisms chosen yet',msg:'Your causal steps do not yet have any levers ticked, so the narrative cannot say how the programme activates them.',fix:'On the Levers step, tick the mechanisms your programme uses for each step.',step:3});
  if(indCount>12)out.push({title:'A heavy measurement set',msg:indCount+' indicators may be too much for a practical one-page scaffold.',fix:'On the Indicators step, keep the minimum set and make the rest optional.',step:4});
  if(placed.length>0&&indCount===0)out.push({title:'No indicators selected',msg:'Without any indicators, the measurement summary will be empty.',fix:'On the Indicators step, keep a few of the recommended measures.',step:4});
  return out;
}
function deriveAssumptions(p){
  const s=p.setup||{};const name=s.name||'the programme';const pop=strip(s.population)||'whānau';
  return [
    cap(pop)+' will engage with '+name+' when it is offered in a way that feels relevant, safe and accessible.',
    'The causal steps chosen reflect how change actually happens for the '+pop+' this programme works with.',
    'The mechanisms named are within the programme\u2019s influence and are applied consistently enough to take effect.'
  ];
}

/* ---------- Causal ring builder (step 3) ---------- */
function CausalRing({p,addStep,removeStep,toggleLink,dismissed,onDismiss,onHelp}){
  const [sel,setSel]=useState(null);
  const [openDom,setOpenDom]=useState({kawa:true});
  const [pending,setPending]=useState(null);
  const addAndSelect=(stepId)=>{addStep(stepId);setPending(stepId);};
  const acts=p.activities||[];
  const ring=p.ring||{placed:[]};
  const placed=[...ring.placed].sort((a,b)=>((STEP_BY_ID[a.stepId]||{}).order||0)-((STEP_BY_ID[b.stepId]||{}).order||0));
  const placedIds={}; placed.forEach(x=>placedIds[x.stepId]=true);
  useEffect(()=>{ if(pending){ const pl=placed.find(x=>x.stepId===pending); if(pl){ setSel(pl.pid); setPending(null); } } },[pending,placed.length]);
  const W=640,H=520,cx=W/2,cy=H/2,rx=250,ry=200;
  const boxH=36,gap=8; const totalH=acts.length*boxH+Math.max(acts.length-1,0)*gap; const startY=cy-totalH/2+boxH/2;
  const actPos={}; acts.forEach((a,i)=>{actPos[a.id]={x:cx,y:startY+i*(boxH+gap)};});
  const m=placed.length; const cardPos={}; placed.forEach((pl,k)=>{const ang=(k/Math.max(m,1))*2*Math.PI;cardPos[pl.pid]={x:cx+rx*Math.sin(ang),y:cy-ry*Math.cos(ang)};});
  const selPlaced=placed.find(x=>x.pid===sel)||null;

  return (
    <div className="split">
      <div className="side ring-side">
        <p className="eyebrow2" style={{marginBottom:8}}>Causal steps</p>
        {DOMAINS.map(dom=>{
          const steps=STEPS_LIB.filter(s=>s.d===dom.key);
          const added=steps.filter(s=>placedIds[s.id]).length;
          const isOpen=!!openDom[dom.key];
          return (
            <div key={dom.key} className="dom-group">
              <button className="dom-toggle" onClick={()=>setOpenDom(o=>({...o,[dom.key]:!o[dom.key]}))} aria-expanded={isOpen}>
                <span className="dom-dot" style={{background:'var(--'+dom.key+')'}}></span>
                <span className="dom-label">{dom.label}</span>
                <span className="dom-count">{added?added+'/':''}{steps.length}</span>
                <span className={"dom-chev2"+(isOpen?' o':'')}>{I.chev}</span>
              </button>
              {isOpen && <div className="dom-steps">
                {steps.map(s=>{const a=!!placedIds[s.id];return (
                  <button key={s.id} className={"palette-step"+(a?' added':'')} disabled={a} onClick={()=>addAndSelect(s.id)} style={{borderLeftColor:'var(--'+dom.key+')'}} title={s.desc}>
                    <span className="ps-name">{s.name}{a&&I.check}</span>
                  </button>
                );})}
              </div>}
            </div>
          );
        })}
      </div>
      <div className="colmain">
        <h1 className="title disp">Wrap your pathway in its change logic</h1>
        <p className="lede">Add the causal steps your programme sets off, then link each to the activities that drive it.</p>
        <WhyBox step={2} onHelp={onHelp} dismissed={dismissed} onDismiss={onDismiss}/>
        <div className="ring-work">
          <div className="ring-build">
            <div className="ring-instruct">{selPlaced ? (<><span>Linking <strong>{(STEP_BY_ID[selPlaced.stepId]||{}).name}</strong> — click an activity to link or unlink it.</span><button className="linkclear" onClick={()=>setSel(null)}>Done</button></>) : <span>Click a step on the ring to start linking it to your activities.</span>}</div>
            <div className="ring-canvas-wrap">
              <div className="ring-canvas" style={{width:W,height:H}}>
                <div className="ring-amb" aria-hidden="true"></div>
                <div className="ring-orbit-guide" aria-hidden="true"></div>
                <svg className="ring-svg" viewBox={"0 0 "+W+" "+H} width={W} height={H}>
                  <ellipse className="ring-ellipse" cx={cx} cy={cy} rx={rx} ry={ry} fill="none" stroke="rgba(20,63,52,.3)" strokeWidth="1.6" strokeDasharray="5 6"/>
                  {placed.map(pl=>pl.links.map(aid=>{const c=cardPos[pl.pid],a=actPos[aid];if(!c||!a)return null;const mx=(c.x+a.x)/2,my=(c.y+a.y)/2;const qx=(mx+cx)/2,qy=(my+cy)/2;const col='var(--'+(STEP_BY_ID[pl.stepId]||{}).d+')';const on=sel===pl.pid;return <path key={pl.pid+aid} d={"M"+c.x+","+c.y+" Q"+qx+","+qy+" "+a.x+","+a.y} fill="none" stroke={col} strokeWidth={on?2.6:1.7} opacity={on?0.85:0.4}/>;}))}
                </svg>
                {acts.map((a,i)=>{const pos=actPos[a.id];const linked=selPlaced&&selPlaced.links.indexOf(a.id)!==-1;const col=linked?'var(--'+(STEP_BY_ID[selPlaced.stepId]||{}).d+')':undefined;return (
                  <div key={a.id} className={"ring-act"+(selPlaced?' linkable':'')+(linked?' linked':'')} style={{left:pos.x,top:pos.y,borderColor:col}} onClick={()=>{if(selPlaced)toggleLink(selPlaced.pid,a.id);}} title={a.label}><span className="ra-num">{i+1}</span><span className="ra-label">{a.label||('Step '+(i+1))}</span></div>
                );})}
                {placed.map(pl=>{const pos=cardPos[pl.pid];const st=STEP_BY_ID[pl.stepId]||{};const isSel=sel===pl.pid;const unlinked=!pl.links||pl.links.length===0;return (
                  <div key={pl.pid} className={"ring-card"+(isSel?' sel':'')+(unlinked?' unlinked':'')} style={{left:pos.x,top:pos.y,borderLeftColor:'var(--'+st.d+')',boxShadow:isSel?'0 0 0 2px var(--'+st.d+')':undefined}} onClick={()=>setSel(isSel?null:pl.pid)} title={unlinked?'Not linked yet — click, then click an activity':st.desc}><span className="rc-name">{st.name}</span><button className="rc-x" onClick={(e)=>{e.stopPropagation();if(sel===pl.pid)setSel(null);removeStep(pl.pid);}} aria-label="Remove" title="Remove">{I.x}</button></div>
                );})}
                {placed.length===0 && <div className="ring-empty">Add causal steps from the left to begin →</div>}
              </div>
            </div>
          </div>
          <div className="ring-key">
            <div className="section-h"><h2>What you've mapped</h2></div>
            {placed.length===0 ? <p className="sub-muted" style={{margin:0}}>No causal steps yet. Add a few from the left to show how your programme creates change.</p> : (
              <>
                {placed.length>7 && <p className="banner" style={{background:'var(--accent-soft)',borderColor:'var(--accent-line)',color:'var(--accent)'}}>That's {placed.length} causal steps. Most theories of change lean on a few primary ones — consider trimming.</p>}
                <ul className="key-list">
                  {placed.map(pl=>{const st=STEP_BY_ID[pl.stepId]||{};const nums=pl.links.map(aid=>{const idx=acts.findIndex(a=>a.id===aid);return idx>=0?idx+1:null;}).filter(x=>x).sort((a,b)=>a-b);return (
                    <li key={pl.pid}><span className="key-dot" style={{background:'var(--'+st.d+')'}}></span><strong>{st.name}</strong>{nums.length? <span className="key-links">&nbsp;→ activity {nums.join(', ')}</span> : <span className="key-none">&nbsp;not linked yet</span>}</li>
                  );})}
                </ul>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function NoSteps({msg}){

function Modal({title,onClose,children,footer}){

      <div className="modal" role="dialog" aria-modal="true" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h3>{title}</h3><button className="iconbtn" onClick={onClose} aria-label="Close">{I.x}</button></div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-foot">{footer}</div>}
      </div>
    </div>

}

/* ---------- Step 4: Levers & mechanisms ---------- */
function Levers({p,toggleLever,setLeverAns,dismissed,onDismiss,onHelp}){
  const placed=placedSorted(p);
  const [edit,setEdit]=useState(null);
  if(placed.length===0) return <NoSteps msg="No causal steps yet — go back to the Causal ring step and add a few first."/>;
  const levs=p.levers||{};
  const openLever=(stepId,leverId,wasOn)=>{ if(!wasOn) toggleLever(stepId,leverId); setEdit({stepId,leverId}); };
  const cur=edit?(LEVER_BY_ID[edit.leverId]||{}):null;
  const curAns=edit?((levs[edit.stepId]||{})[edit.leverId]||''):'';
  return (
    <div className="container">
      <h1 className="title disp">How your programme activates each step</h1>
      <p className="lede">Tick the levers each step uses — a pop-up asks you how, in your own words.</p>
      <WhyBox step={3} onHelp={onHelp} dismissed={dismissed} onDismiss={onDismiss}/>
      <div className="lev-grid">
        {placed.map(pl=>{
          const st=STEP_BY_ID[pl.stepId]||{};const sel=levs[pl.stepId]||{};
          return (
            <div className="lev-card" key={pl.pid}>
              <div className="lev-head"><span className="key-dot" style={{background:'var(--'+st.d+')'}}></span><strong>{st.name}</strong></div>
              <div className="chip-wrap">
                {leversFor(st.d).map(l=>{const on=(l.id in sel);const ans=on&&(sel[l.id]||'').trim();return (
                  <button key={l.id} className={"chip"+(on?' on':'')} style={on?{background:'var(--'+st.d+')',borderColor:'var(--'+st.d+')'}:null} onClick={()=>openLever(pl.stepId,l.id,on)} title={l.q}>
                    {ans?<span className="chip-ck">{I.check}</span>:null}{l.name}
                  </button>
                );})}
              </div>
            </div>
          );
        })}
      </div>
      {edit && <Modal title={cur.name} onClose={()=>setEdit(null)} footer={<><button className="btn btn-ghost" onClick={()=>{toggleLever(edit.stepId,edit.leverId);setEdit(null);}}>Remove lever</button><button className="btn btn-primary" onClick={()=>setEdit(null)}>Done</button></>}>
        <p className="modal-q">{cur.q}</p>
        <textarea rows="4" autoFocus value={curAns} onChange={e=>setLeverAns(edit.stepId,edit.leverId,e.target.value)} placeholder="In a sentence…"/>
      </Modal>}
    </div>
  );
}

/* ---------- Step 5: Indicators ---------- */
function Indicators({p,toggleIndicator,dismissed,onDismiss,onHelp}){
  const placed=placedSorted(p);
  const [detail,setDetail]=useState(null);
  if(placed.length===0) return <NoSteps msg="No causal steps yet — add some on the Causal ring step and indicators will be recommended here."/>;
  const ind=p.indicators||{};const on=(id)=>ind[id]!==false;
  const count=placed.filter(pl=>on(pl.stepId)).length;
  const dStep=detail?(STEP_BY_ID[detail]||{}):null;const dInd=detail?INDICATORS[detail]:null;

        {placed.map(pl=>{const st=STEP_BY_ID[pl.stepId]||{};const d=INDICATORS[pl.stepId];if(!d)return null;const checked=on(pl.stepId);return (

            <button className="ind-main" onClick={()=>setDetail(pl.stepId)}>
              <span className="ind-row1"><span className="key-dot" style={{background:'var(--'+st.d+')'}}></span><strong>{st.name}</strong>{d.minSet&&<span className="ind-star">★</span>}</span>
              <span className="ind-row2"><span className="lvl">{d.level}</span><span className="ind-tim">{d.timing}</span></span>
              <span className="ind-prev">{d.know}</span>
            </button>
          </div>
        );})}
      </div>
      {detail && dInd && <Modal title={dStep.name} onClose={()=>setDetail(null)} footer={<><span className="modal-meta">{dInd.level} · {dInd.timing}{dInd.minSet?' · ★ minimum set':''}</span><button className={"btn"+(on(detail)?'':' btn-primary')} onClick={()=>toggleIndicator(detail)}>{on(detail)?'Remove from set':'Add to set'}</button></>}>
        <div className="md-field"><span className="ind-lab">What to know</span><p>{dInd.know}</p></div>

        <div className="md-field"><span className="ind-lab">Countable measure</span><p>{dInd.countable}</p></div>
        <div className="md-field"><span className="ind-lab">Admin / IDI data <em className="sens">sensitive · usually needs data agreements</em></span><p>{dInd.admin}</p></div>
      </Modal>}
    </div>
  );
}

/* ---------- Step 6: Narrative ---------- */
function Narrative({p,setNarrative,dismissed,onDismiss,onHelp}){
  const [busy,setBusy]=useState(false);const [msg,setMsg]=useState('');
  useEffect(()=>{ if(!p.narrative||!p.narrative.trim()) setNarrative(buildNarrative(p)); },[]);
  const acts=(p.activities||[]).filter(a=>(a.label||'').trim());const placed=placedSorted(p);const levc=selectedLevers(p).length;
  const ai=async()=>{ setBusy(true);setMsg(''); try{ const t=await aiImprove(p); if(t)setNarrative(t); else setMsg('No text came back — the template draft below is ready to edit.'); }catch(e){ setMsg('AI assist runs in the hosted version, so it is not available in this offline preview. The template draft below works without it.'); } setBusy(false); };
  return (
    <div className="container">
      <h1 className="title disp">Your theory of change, in words</h1>
      <p className="lede">A plain-language draft, built only from what you have chosen. Edit it freely — the final words are always yours.</p>
      <WhyBox step={5} onHelp={onHelp} dismissed={dismissed} onDismiss={onDismiss}/>
      <div className="narr-tools"><button className="btn" onClick={()=>setNarrative(buildNarrative(p))}>Rebuild from my selections</button><button className="btn" onClick={ai} disabled={busy}>{busy?'Working…':'Polish with AI'}</button></div>
      {msg && <p className="hint" style={{margin:'0 0 12px',maxWidth:720}}>{msg}</p>}
      <textarea className="narr-area" rows="12" value={p.narrative||''} onChange={e=>setNarrative(e.target.value)} placeholder="Your narrative…"/>
      <div className="narr-src"><strong>What this draft uses</strong><ul><li>Your setup answers (name, who you work with, the need and the change)</li><li>{acts.length} activit{acts.length===1?'y':'ies'} from your pathway</li><li>{placed.length} causal step{placed.length===1?'':'s'} and {levc} selected lever{levc===1?'':'s'}</li></ul><p className="hint" style={{margin:0}}>It draws only on your inputs and never adds new claims.</p></div>
    </div>
  );
}

/* ---------- Step 7: Coherence ---------- */
function Coherence({p,goStep,dismissed,onDismiss,onHelp}){
  const issues=checkCoherence(p);
  return (
    <div className="container">
      <h1 className="title disp">A gentle coherence check</h1>
      <p className="lede">These are not errors — just a few thoughtful prompts to help your theory of change hold together. Nothing here stops you finishing.</p>
      <WhyBox step={6} onHelp={onHelp} dismissed={dismissed} onDismiss={onDismiss}/>
      {issues.length===0 ? (<div className="coh-ok">{I.check}<span>Your theory of change reads as coherent — nothing to flag. You are ready to export.</span></div>) : issues.map((iss,i)=>(
        <div className="coh-card" key={i}><div className="coh-h">{iss.title}</div><p className="coh-msg">{iss.msg}</p><p className="coh-fix"><strong>Suggestion:</strong> {iss.fix}</p>{iss.step!=null && <button className="btn btn-ghost" onClick={()=>goStep(iss.step)}>Go to {STEPS[iss.step]} {I.right}</button>}</div>
      ))}
    </div>
  );
}

/* ---------- Static ring (export visual) ---------- */
function StaticRing({p}){
  const acts=p.activities||[];const placed=placedSorted(p);
  const W=560,H=430,cx=W/2,cy=H/2,rx=212,ry=165;
  const boxH=30,gap=6;const totalH=acts.length*boxH+Math.max(acts.length-1,0)*gap;const startY=cy-totalH/2+boxH/2;
  const actPos={};acts.forEach((a,i)=>{actPos[a.id]={x:cx,y:startY+i*(boxH+gap)};});
  const m=placed.length;const cardPos={};placed.forEach((pl,k)=>{const ang=(k/Math.max(m,1))*2*Math.PI;cardPos[pl.pid]={x:cx+rx*Math.sin(ang),y:cy-ry*Math.cos(ang)};});
  return (
    <div className="static-ring" style={{width:W,height:H}}>
      <svg className="sr-svg" viewBox={"0 0 "+W+" "+H} width={W} height={H}>
        <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill="none" stroke="rgba(20,63,52,.28)" strokeWidth="1.4" strokeDasharray="4 6"/>
        {placed.map(pl=>pl.links.map(aid=>{const c=cardPos[pl.pid],a=actPos[aid];if(!c||!a)return null;const qx=((c.x+a.x)/2+cx)/2,qy=((c.y+a.y)/2+cy)/2;return <path key={pl.pid+aid} d={"M"+c.x+","+c.y+" Q"+qx+","+qy+" "+a.x+","+a.y} fill="none" stroke={'var(--'+(STEP_BY_ID[pl.stepId]||{}).d+')'} strokeWidth="1.5" opacity="0.45"/>;}))}
      </svg>
      {acts.map((a,i)=>{const pos=actPos[a.id];return <div className="sr-act" key={a.id} style={{left:pos.x,top:pos.y}} title={a.label}><span className="n">{i+1}</span><span className="l">{a.label||('Step '+(i+1))}</span></div>;})}
      {placed.map(pl=>{const pos=cardPos[pl.pid];const st=STEP_BY_ID[pl.stepId]||{};return <div className="sr-card" key={pl.pid} style={{left:pos.x,top:pos.y,borderLeftColor:'var(--'+st.d+')'}}>{st.name}</div>;})}
    </div>
  );
}

/* ---------- Step 8: Export ---------- */
function Export({p,dismissed,onDismiss,onHelp}){
  const placed=placedSorted(p);const acts=p.activities||[];const ind=p.indicators||{};
  const indSteps=placed.filter(pl=>ind[pl.stepId]!==false&&INDICATORS[pl.stepId]);
  const narrative=(p.narrative&&p.narrative.trim())?p.narrative:buildNarrative(p);
  const purpose=strip(p.setup.mainChange)?cap(lc(strip(p.setup.mainChange)))+'.':'';
  const assumptions=deriveAssumptions(p);
  return (
    <div className="container">
      <WhyBox step={7} onHelp={onHelp} dismissed={dismissed} onDismiss={onDismiss} className="no-print"/>
      <div className="export-toolbar no-print"><p className="hint" style={{margin:0,maxWidth:540}}>Two one-pagers, built from your selections. Use Print to save them as a PDF (choose “Save as PDF” as the destination).</p><button className="btn btn-primary" onClick={()=>window.print()}>Print / Save as PDF</button></div>
      <div className="export-page">
        <div className="ep-head"><div><div className="ep-kicker">Theory of change</div><h2 className="ep-title">{p.setup.name||'Untitled programme'}</h2></div><Tile s={34}/></div>
        {purpose && <p className="ep-purpose">{purpose}</p>}
        <StaticRing p={p}/>
        <div className="ep-narr">{narrative.split('\n\n').filter(Boolean).map((para,i)=><p key={i}>{para}</p>)}</div>
        <div className="ep-cols">
          <div><h3>Causal steps &amp; levers</h3><ul className="ep-sl">{placed.length===0?<li>No causal steps selected.</li>:placed.map(pl=>{const st=STEP_BY_ID[pl.stepId]||{};const sel=(p.levers||{})[pl.stepId]||{};const lev=Object.keys(sel).map(id=>(LEVER_BY_ID[id]||{}).name).filter(Boolean);return <li key={pl.pid}><span className="key-dot" style={{background:'var(--'+st.d+')',marginTop:5}}></span><span><strong>{st.name}</strong>{lev.length>0&&<span className="sl-lev">{lev.join(', ')}</span>}</span></li>;})}</ul></div>
          <div><h3>Key assumptions</h3><ol className="ep-as">{assumptions.map((a,i)=><li key={i}>{a}</li>)}</ol></div>
        </div>
      </div>
      <div className="export-page">
        <div className="ep-head"><div><div className="ep-kicker">Measurement summary</div><h2 className="ep-title">{p.setup.name||'Untitled programme'}</h2></div><Tile s={34}/></div>
        {indSteps.length===0 ? <p className="ep-purpose">No indicators selected yet. Choose some on the Indicators step.</p> : (
          <div className="meas-list">{indSteps.map(pl=>{const st=STEP_BY_ID[pl.stepId]||{};const d=INDICATORS[pl.stepId];return (
            <div className="meas-block" key={pl.pid}>
              <div className="mb-head"><span className="key-dot" style={{background:'var(--'+st.d+')'}}></span><strong>{st.name}</strong><span className="lvl">{d.level}</span><span className="mb-tim">{d.timing}</span></div>
              <div className="mb-grid">
                <div className="mb-f"><span className="mb-lab">What to know</span><p>{d.know}</p></div>
                <div className="mb-f"><span className="mb-lab">Whānau prompt</span><p>{d.whanau}</p></div>
                <div className="mb-f"><span className="mb-lab">Practitioner signal</span><p>{d.signal}</p></div>
                <div className="mb-f"><span className="mb-lab">Countable measure</span><p>{d.countable}</p></div>
                <div className="mb-f mb-wide"><span className="mb-lab">Admin / IDI data <em className="sens">sensitive · usually needs data agreements</em></span><p>{d.admin}</p></div>
              </div>
            </div>
          );})}</div>
        )}
      </div>
    </div>
  );
}

/* ============ HELP (why + impact + how) ============ */
const HELP={
  dashboard:{title:'Your dashboard',why:'This is your home. Everything you build is saved here, and the examples give you a real starting point instead of a blank page.',impact:'Adapting a worked example gets you to a credible theory of change far faster than starting cold.',how:['Open an example to explore a finished theory of change','Or start a new one with the green button','Reopen anything you have saved from the list below']},
  0:{title:'Setup',why:'A few plain details about your programme, so the tool can speak in your context rather than generic language.',impact:'These answers seed your narrative and tailor the indicator suggestions later — better in, better out.',how:['Write a sentence or two per box, no jargon needed','Everything saves as you type','Come back and refine it anytime']},
  1:{title:'Pathway',why:'Your real activities, in the order they happen — the concrete things your programme actually does.',impact:'This is the backbone everything hangs on; the causal steps and measures all attach to these activities.',how:['Add steps, or start from a template and adjust','Rename, reorder, or remove any row','Keep each step to one clear action']},
  2:{title:'Causal ring',why:'Activities are what you do; causal steps are the change underneath. Linking them shows how your work creates change.',impact:'This is the heart of the theory of change — it turns a list of activities into a logic of how change happens.',how:['Add a causal step from the left','Click it on the ring, then click an activity to link them','A new step stays dashed until you link it']},
  3:{title:'Levers',why:'For each causal step, the levers name the mechanism — the “how” that makes that change actually fire.',impact:'Levers make your logic specific and defensible, and they feed the narrative’s explanation of how change works.',how:['Tick only the levers a step genuinely uses','Answer the short pop-up question in your words','A couple of levers per step is plenty']},
  4:{title:'Indicators',why:'For each step, a practical way to tell whether the change is really happening — in whānau words, practitioner signals and counts.',impact:'This becomes your one-page measurement summary — how you will show the programme is working.',how:['Keep the ones that fit; untick the rest','Tap a card for the full detail','Aim for 8–12 across the whole set']},
  5:{title:'Narrative',why:'A plain-language story of your theory of change, assembled only from the choices you have made.',impact:'This is the words people read — the narrative on your one-page theory of change.',how:['Read the draft built from your selections','Edit it freely in your own voice','Rebuild it if you change things, or polish with AI']},
  6:{title:'Review',why:'A few gentle prompts that check your logic holds together before you export.',impact:'Catching gaps now means the theory of change you share is stronger and more credible.',how:['Read each “something to consider” prompt','Use the link to jump back and adjust','Nothing here blocks you from finishing']},
  7:{title:'Export',why:'Your two finished one-pagers — the theory of change and the measurement summary.',impact:'These are the shareable outputs for funders, partners and your team to sign off.',how:['Check both pages read well','Use Print and choose “Save as PDF”','Come back and re-export anytime you update']}
};
function WhyBox({step,onHelp,dismissed,onDismiss,className}){
  const h=HELP[step]; if(!h) return null;
  const id='why-'+step;
  if(dismissed.indexOf(id)!==-1) return null;
  return (
    <div className={"why"+(className?' '+className:'')}>
      <span className="why-ic">{I.bulb}</span>
      <div className="why-tx">
        <span className="why-line"><span className="why-k">Why this step</span>{h.why}</span>
        <span className="why-line"><span className="why-k">How it shows impact</span>{h.impact}</span>
      </div>
      <div className="why-act">
        <button className="why-link" onClick={()=>onHelp(step)}>How to use {I.right}</button>
        <button className="why-x" onClick={()=>onDismiss(id)} aria-label="Dismiss" title="Dismiss">{I.x}</button>
      </div>
    </div>
  );
}
function HelpPage({focus,onClose,goStep}){
  const refs=useRef({});
  useEffect(()=>{ if(focus!=null&&refs.current[focus]&&refs.current[focus].scrollIntoView){ refs.current[focus].scrollIntoView({behavior:'smooth',block:'center'}); } },[focus]);
  const order=['dashboard',0,1,2,3,4,5,6,7];
  return (
    <div className="container help-wrap">
      <div className="dash-head">
        <div><h1 className="title disp">How to use Whiria Ngā Ara</h1><p className="hint" style={{marginTop:2}}>What each screen is for, why it matters, and how to use it. Jump straight to any screen.</p></div>
        <button className="btn btn-ghost" onClick={onClose}>{I.left} Back</button>
      </div>
      <div className="help-list">
        {order.map(k=>{const h=HELP[k];const isStep=(typeof k==='number');return (
          <div className={"help-card"+(focus===k?' focus':'')} key={String(k)} ref={el=>{refs.current[k]=el;}}>
            <div className="help-h"><span className="help-num">{isStep?(k+1):'·'}</span><h2>{h.title}</h2>{isStep&&<button className="btn btn-ghost help-go" onClick={()=>goStep(k)}>Go to this screen {I.right}</button>}</div>
            <p className="help-p"><strong>Why we do this.</strong> {h.why}</p>
            <p className="help-p"><strong>How it shows impact.</strong> {h.impact}</p>
            <div className="help-how"><span className="help-how-l">How to use it</span><ol>{h.how.map((s,i)=><li key={i}>{s}</li>)}</ol></div>
          </div>
        );})}
      </div>
    </div>
  );
}

/* ============ APP ============ */
function App(){
  const [lang,setLang]=useState('en');
  const [booted,setBooted]=useState(false);
  const [user,setUser]=useState(null);
  const [view,setView]=useState('landing');
  const [index,setIndex]=useState([]);
  const [project,setProject]=useState(null);
  const [step,setStep]=useState(0);
  const [saved,setSaved]=useState(false);
  const [dismissed,setDismissed]=useState([]);
  const [helpFocus,setHelpFocus]=useState(null);
  const [helpReturn,setHelpReturn]=useState('dashboard');

  useEffect(()=>{(async()=>{
    const idx=await store.get('project_index'); setIndex(idx||[]);
    const dt=await store.get('dismissed_tips'); setDismissed(dt||[]);
    setBooted(true);
  })();},[]);

  useEffect(()=>{
    if(!project)return;
    const t=setTimeout(async()=>{
      const p={...project,updatedAt:Date.now()};
      await store.set('project:'+p.id,p);
      setIndex(prev=>{const name=p.setup.name||'Untitled theory of change';const entry={id:p.id,name,type:p.setup.type,updatedAt:p.updatedAt};const next=prev.find(e=>e.id===p.id)?prev.map(e=>e.id===p.id?entry:e):[entry,...prev];store.set('project_index',next);return next;});
      setSaved(true);setTimeout(()=>setSaved(false),1400);
    },600);
    return ()=>clearTimeout(t);
  },[project]);

  function dismissTip(id){ setDismissed(d=>{ if(d.indexOf(id)!==-1)return d; const n=[...d,id]; store.set('dismissed_tips',n); return n; }); }
  function openHelp(focusStep){ setHelpFocus(focusStep!=null?focusStep:null); setHelpReturn(view==='help'?helpReturn:view); setView('help'); }
  function closeHelp(){ setView(helpReturn||'dashboard'); }
  function helpGoStep(i){ if(project){ setStep(i); setView('project'); } else { setView('dashboard'); } }
  function signIn(u){ setUser(u); setView('dashboard'); }
  function signOut(){ setUser(null); setProject(null); setView('landing'); }
  function goHome(){ setProject(null); setView('dashboard'); }

  async function newProject(){
    const id=uid();
    const p={id,createdAt:Date.now(),updatedAt:Date.now(),setup:{name:'',population:'',need:'',mainChange:'',type:'',context:''},activities:[],ring:{placed:[]},levers:{},indicators:{},narrative:''};
    await store.set('project:'+id,p);
    const entry={id,name:'Untitled theory of change',type:'',updatedAt:p.updatedAt};
    const next=[entry,...index];setIndex(next);await store.set('project_index',next);
    setProject(p);setStep(0);setView('project');
  }
  async function startFromExample(key){
    const ex=EXAMPLES.find(e=>e.key===key); const tpl=TEMPLATES[key];
    const id=uid();
    const acts=tpl.acts.map(l=>({id:uid(),label:l}));
    const placed=tpl.primary.map((stepId,i)=>({pid:uid(),stepId,links:acts[i]?[acts[i].id]:[]}));
    const p={id,createdAt:Date.now(),updatedAt:Date.now(),setup:{name:tpl.name+' — example',population:ex.setup.population,need:ex.setup.need,mainChange:ex.setup.mainChange,type:tpl.type,context:''},activities:acts,ring:{placed},levers:{},indicators:{},narrative:''};
    await store.set('project:'+id,p);
    const entry={id,name:p.setup.name,type:p.setup.type,updatedAt:p.updatedAt};
    const next=[entry,...index];setIndex(next);await store.set('project_index',next);
    setProject(p);setStep(0);setView('project');
  }
  async function openProject(id){const p=await store.get('project:'+id);if(p){if(!p.setup)p.setup={name:'',population:'',need:'',mainChange:'',type:'',context:''};if(!p.activities)p.activities=[];if(!p.ring)p.ring={placed:[]};if(!p.levers)p.levers={};if(!p.indicators)p.indicators={};if(p.narrative==null)p.narrative='';setProject(p);setStep(0);setView('project');}}
  async function deleteProject(id){if(!window.confirm('Delete this theory of change? This cannot be undone.'))return;const next=index.filter(e=>e.id!==id);setIndex(next);await store.set('project_index',next);await store.del('project:'+id);}

  const setField=(k,v)=>setProject(p=>({...p,setup:{...p.setup,[k]:v}}));
  const addAct=()=>setProject(p=>({...p,activities:[...p.activities,{id:uid(),label:''}]}));
  const setAct=(id,label)=>setProject(p=>({...p,activities:p.activities.map(a=>a.id===id?{...a,label}:a)}));
  const delAct=(id)=>setProject(p=>{const ring=p.ring||{placed:[]};const placed=ring.placed.map(x=>({...x,links:x.links.filter(l=>l!==id)}));return {...p,activities:p.activities.filter(a=>a.id!==id),ring:{...ring,placed}};});
  const moveAct=(id,dir)=>setProject(p=>{const a=[...p.activities];const i=a.findIndex(x=>x.id===id);const j=i+dir;if(j<0||j>=a.length)return p;[a[i],a[j]]=[a[j],a[i]];return{...p,activities:a};});
  const applyTpl=(key)=>{const tpl=TEMPLATES[key];if((project.activities.length||(project.ring&&project.ring.placed.length))&&!window.confirm('Replace your current pathway and ring with the '+tpl.name+' template?'))return;const acts=tpl.acts.map(l=>({id:uid(),label:l}));const placed=tpl.primary.map((stepId,i)=>({pid:uid(),stepId,links:acts[i]?[acts[i].id]:[]}));setProject(p=>({...p,setup:{...p.setup,type:p.setup.type||tpl.type},activities:acts,ring:{placed}}));};

  const addStep=(stepId)=>setProject(p=>{const ring=p.ring||{placed:[]};if(ring.placed.find(x=>x.stepId===stepId))return p;return {...p,ring:{...ring,placed:[...ring.placed,{pid:uid(),stepId,links:[]}]}};});
  const removeStep=(pid)=>setProject(p=>({...p,ring:{...p.ring,placed:p.ring.placed.filter(x=>x.pid!==pid)}}));
  const toggleLink=(pid,aid)=>setProject(p=>({...p,ring:{...p.ring,placed:p.ring.placed.map(x=>{if(x.pid!==pid)return x;const has=x.links.indexOf(aid)!==-1;return {...x,links:has?x.links.filter(l=>l!==aid):[...x.links,aid]};})}}));

  const toggleLever=(stepId,leverId)=>setProject(p=>{const levers={...(p.levers||{})};const s={...(levers[stepId]||{})};if(leverId in s)delete s[leverId];else s[leverId]='';if(Object.keys(s).length)levers[stepId]=s;else delete levers[stepId];return {...p,levers};});
  const setLeverAns=(stepId,leverId,val)=>setProject(p=>{const levers={...(p.levers||{})};const s={...(levers[stepId]||{})};s[leverId]=val;levers[stepId]=s;return {...p,levers};});
  const toggleIndicator=(stepId)=>setProject(p=>{const ind={...(p.indicators||{})};ind[stepId]=(ind[stepId]===false)?true:false;return {...p,indicators:ind};});
  const setNarrative=(t)=>setProject(p=>({...p,narrative:t}));

  function onBack(){if(step===0){goHome();}else setStep(step-1);}
  function onNext(){if(step<7)setStep(step+1);else goHome();}

  if(!booted) return <div className="container"><p className="hint">Loading…</p></div>;
  if(view==='landing') return <Landing onSignIn={signIn}/>;

  return (
    <div className="shell">
      <TopBar step={view==='project'?step:null} saved={saved} lang={lang} setLang={setLang} user={user} onHome={goHome} onSignOut={signOut} onHelp={()=>openHelp(view==='project'?step:null)}/>
      <div className="main">
        {view==='dashboard' && <Dashboard index={index} user={user} onNew={newProject} onExample={startFromExample} onOpen={openProject} onDelete={deleteProject} dismissed={dismissed} onDismiss={dismissTip} onHelp={openHelp}/>}
        {view==='help' && <HelpPage focus={helpFocus} onClose={closeHelp} goStep={helpGoStep}/>}
        {view==='project' && <>
          {step===0 && <Setup p={project} setField={setField} reo={lang==='mi'} dismissed={dismissed} onDismiss={dismissTip} onHelp={openHelp}/>}
          {step===1 && <Pathway p={project} add={addAct} setAct={setAct} del={delAct} move={moveAct} applyTpl={applyTpl} dismissed={dismissed} onDismiss={dismissTip} onHelp={openHelp}/>}
          {step===2 && <CausalRing p={project} addStep={addStep} removeStep={removeStep} toggleLink={toggleLink} dismissed={dismissed} onDismiss={dismissTip} onHelp={openHelp}/>}
          {step===3 && <Levers p={project} toggleLever={toggleLever} setLeverAns={setLeverAns} dismissed={dismissed} onDismiss={dismissTip} onHelp={openHelp}/>}
          {step===4 && <Indicators p={project} toggleIndicator={toggleIndicator} dismissed={dismissed} onDismiss={dismissTip} onHelp={openHelp}/>}
          {step===5 && <Narrative p={project} setNarrative={setNarrative} dismissed={dismissed} onDismiss={dismissTip} onHelp={openHelp}/>}
          {step===6 && <Coherence p={project} goStep={setStep} dismissed={dismissed} onDismiss={dismissTip} onHelp={openHelp}/>}
          {step===7 && <Export p={project} dismissed={dismissed} onDismiss={dismissTip} onHelp={openHelp}/>}
        </>}
      </div>
      {view==='project' && <Footer step={step} onBack={onBack} onNext={onNext}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
